{{- range .Values.ipAddressPools }}
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "metallb.labels" $ | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    {{- with .annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  addresses:
  {{- range .addresses }}
    - {{ . }}
  {{- end }}
  {{- with .autoAssign }}
  autoAssign: {{ . }}
  {{- end }}
  {{- with .avoidBuggyIPs }}
  avoidBuggyIPs: {{ . }}
  {{- end }}
{{- end }}
